    {src:"https://scontent.fdac138-1.fna.fbcdn.net/v/t39.30808-6/683662433_122235242798110933_4625042419215792861_n.jpg?_nc_cat=111&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=Af-egB3mAkIQ7kNvwE0qLH2&_nc_oc=AdqI68_vj2Wj8huVddZEZyAa5BSprtU7cEBJuQFbVhONe6btxVi6vj_SKdfQXCcRJb8&_nc_zt=23&_nc_ht=scontent.fdac138-1.fna&_nc_gid=ckieuac7VDihhA4erquBLw&_nc_ss=7b2a8&oh=00_Af5hM3fB1Wq1juayZ99SS9KprpxI8tfl5UQCP4WOpn4n8A&oe=6A17A83D", title:"MY PROFILE PHOTO"}
        ];

        const gallery=document.getElementById('gallery');
        const searchInput=document.getElementById('searchInput');
        const addImageBtn=document.getElementById('addImageBtn');
        const lightbox=document.getElementById('lightbox');
        const lightboxImg=document.getElementById('lightbox-img');
        const contactPanel=document.getElementById('contact-panel');
        const hamburger=document.getElementById('hamburger');

        function renderGallery(items){
            gallery.innerHTML="";
            items.forEach(item=>{
                const div=document.createElement('div');
                div.className="gallery-item";
                div.innerHTML=`
                    <img src="${item.src}" alt="${item.title}" onclick="viewImage('${item.src}')">
                    <div class="info">
                        <span>${item.title}</span>
                        <div class="buttons">
                            <button onclick="downloadImage('${item.src}',event)">Download</button>
                            <button onclick="viewImage('${item.src}',event)">View</button>
                            <button onclick="deleteImage('${item.src}',event)">Delete</button>
                        </div>
                    </div>
                `;
                gallery.appendChild(div);
            });
        }

        function viewImage(src,event){
            if(event) event.stopPropagation();
            lightboxImg.src=src;
            lightbox.style.display='flex';
        }
        function closeLightbox(){ lightbox.style.display='none'; }

        function downloadImage(src,event){
            event.stopPropagation();
            const link=document.createElement('a');
            link.href=src;
            link.download=src.split('/').pop();
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function deleteImage(src,event){
            event.stopPropagation();
            const index=images.findIndex(img=>img.src===src);
            if(index>-1){
                images.splice(index,1);
                renderGallery(images);
            }
        }

        searchInput.addEventListener('input',function(){
            const query=this.value.toLowerCase();
            renderGallery(images.filter(img=>img.title.toLowerCase().includes(query)));
        });

        addImageBtn.addEventListener('click',()=>{
            const url=prompt("Paste Image URL:");
            if(url){
                const title=prompt("Image Title:");
                images.push({src:url, title:title || "Untitled"});
                renderGallery(images);
            }
        });

        hamburger.addEventListener('click',(e)=>{
            e.stopPropagation();
            contactPanel.classList.toggle('open');
        });
        document.body.addEventListener('click',()=> contactPanel.classList.remove('open'));

        renderGallery(images);
    </script>
